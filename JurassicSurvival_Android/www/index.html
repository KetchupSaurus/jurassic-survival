<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Jurassic Survival</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
      <span id="apple-count">🍎 0</span>
      <span id="dino-name">🦕 Gallimimus</span>
      <span id="hp-display">HP: ♥♥♥</span>
      <span id="score">Score: 0</span>
    </div>
    <div id="game-over" class="hidden">
      <h1>YOU DIED</h1>
      <p id="final-score"></p>
      <button onclick="restartGame()">Play Again</button>
    </div>
    <div id="start-screen">
      <h1>Jurassic Survival</h1>
      <p>Eat apples to evolve. Avoid tar pits.<br>Tap <strong>ATK</strong> near an enemy to attack.</p>
      <p style="font-size:12px;opacity:0.6;margin-top:8px">🎮 PS5 / Xbox controller supported<br>Left stick or D-pad to move &nbsp;|&nbsp; A / Cross / R1 / R2 to attack</p>
      <div class="mode-buttons">
        <button onclick="startGame(false)">Play</button>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
